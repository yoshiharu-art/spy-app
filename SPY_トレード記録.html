<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trade Log">
<meta name="theme-color" content="#04080c">
<title>SPY 0DTE トレード記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080c;--bg2:rgba(0,0,0,.4);--border:rgba(255,255,255,.07);
  --g:#00e87a;--r:#ff2d55;--y:#f5c518;--b:#00aaff;--p:#b450ff;
  --text:#c0d0de;--dim:#405060;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:.15s}
input,select,textarea{font-family:inherit;outline:none}
.wrap{max-width:860px;margin:0 auto;padding:16px 12px}

/* Header */
.hdr{border-bottom:1px solid rgba(0,232,122,.15);padding-bottom:12px;margin-bottom:16px}
.hdr-sub{font-size:8px;letter-spacing:4px;color:var(--g);opacity:.6;margin-bottom:3px}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:2px}
.hdr-title span{color:var(--g)}

/* Stats bar */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--border);padding:10px 12px}
.stat-l{font-size:8px;letter-spacing:1px;opacity:.6;margin-bottom:3px}
.stat-v{font-size:20px;font-weight:700;line-height:1}
.stat-s{font-size:8px;opacity:.5;margin-top:2px}

/* Form */
.form-card{background:rgba(0,232,122,.04);border:1px solid rgba(0,232,122,.25);padding:14px;margin-bottom:14px}
.form-title{font-size:8px;letter-spacing:3px;color:var(--g);margin-bottom:12px}
.row{display:grid;gap:8px;margin-bottom:8px}
.r2{grid-template-columns:1fr 1fr}
.r3{grid-template-columns:1fr 1fr 1fr}
.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.field label{font-size:8px;color:var(--dim);display:block;margin-bottom:4px;letter-spacing:1px}
.field input,.field select,.field textarea{
  width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  color:var(--text);padding:7px 9px;font-size:13px
}
.field input:focus,.field select:focus{border-color:rgba(0,232,122,.5)}
.field select option{background:#111}

/* Direction buttons */
.dir-btns{display:flex;gap:6px}
.dir-btn{flex:1;padding:9px;border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.4);color:var(--dim);font-size:11px;font-weight:700;letter-spacing:2px}
.dir-btn.call-on{background:rgba(0,232,122,.18);border-color:var(--g);color:var(--g)}
.dir-btn.put-on{background:rgba(255,45,85,.18);border-color:var(--r);color:var(--r)}

/* Grade buttons */
.grade-btns{display:flex;gap:4px}
.gbtn{flex:1;padding:6px 4px;border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.4);color:var(--dim);font-size:11px;font-weight:900;font-style:italic}
.gbtn.on-A{background:rgba(0,232,122,.18);border-color:var(--g);color:var(--g)}
.gbtn.on-B{background:rgba(180,220,0,.18);border-color:#b4dc00;color:#b4dc00}
.gbtn.on-C{background:rgba(255,165,0,.18);border-color:#ffa500;color:#ffa500}
.gbtn.on-D{background:rgba(255,45,85,.18);border-color:var(--r);color:var(--r)}

/* PnL preview */
.pnl-prev{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);margin-top:8px}
.pnl-num{font-size:26px;font-weight:700}

/* Submit */
.submit-btn{width:100%;padding:12px;background:rgba(0,232,122,.08);
  border:1px solid rgba(0,232,122,.4);color:var(--g);
  font-size:11px;letter-spacing:4px;font-weight:700;margin-top:10px}
.submit-btn:hover{background:rgba(0,232,122,.16)}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:5px 8px;color:var(--dim);font-weight:400;text-align:left;
   border-bottom:1px solid rgba(0,232,122,.12);white-space:nowrap;font-size:8px;letter-spacing:1px}
td{padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.02)}
.del-btn{background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;padding:2px 5px}
.del-btn:hover{color:var(--r)}

/* Filters */
.filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fbtn{background:var(--bg2);border:1px solid var(--border);color:var(--dim);
  padding:4px 10px;font-size:9px}
.fbtn.on{background:rgba(0,232,122,.12);border-color:rgba(0,232,122,.5);color:var(--g)}

/* Monthly chart */
.chart-wrap{margin-bottom:14px}
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.chart-label{font-size:9px;color:var(--dim);width:50px;text-align:right;flex-shrink:0}
.chart-bar{height:18px;border-radius:2px;min-width:2px;transition:width .4s}
.chart-val{font-size:9px;font-weight:700;margin-left:4px}

/* Equity curve */
.curve-wrap{background:var(--bg2);border:1px solid var(--border);padding:10px 14px;margin-bottom:14px}
.curve-title{font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:6px}

/* Sections */
.sec-title{font-size:8px;letter-spacing:3px;color:var(--dim);margin-bottom:8px;margin-top:4px}
.empty{color:var(--dim);font-size:10px;padding:20px;text-align:center}

@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade{animation:up .25s ease}

/* Tab */
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{background:none;border:1px solid rgba(0,232,122,.18);color:var(--dim);
  padding:6px 14px;font-size:10px;letter-spacing:1px}
.tab.on{background:rgba(0,232,122,.1);border-color:rgba(0,232,122,.65);color:var(--g)}
.pane{display:none}.pane.on{display:block}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div class="hdr-sub">0DTE OPTIONS ▸ TRADE JOURNAL</div>
  <h1 class="hdr-title">SPY <span>0DTE</span> トレード記録</h1>
</div>

<!-- STATS -->
<div class="stats" id="stats-bar">
  <div class="stat"><div class="stat-l">総トレード</div><div class="stat-v" id="s-total">0</div><div class="stat-s">回</div></div>
  <div class="stat"><div class="stat-l">勝率</div><div class="stat-v" id="s-wr" style="color:var(--g)">—</div><div class="stat-s" id="s-wr-sub">0勝0敗</div></div>
  <div class="stat"><div class="stat-l">平均損益</div><div class="stat-v" id="s-avg">—</div><div class="stat-s">1T平均</div></div>
  <div class="stat"><div class="stat-l">累計損益</div><div class="stat-v" id="s-cum">—</div><div class="stat-s">プレミアム対比</div></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab on" onclick="sw('entry',this)">＋ 記録</button>
  <button class="tab" onclick="sw('log',this)">📋 履歴</button>
  <button class="tab" onclick="sw('stats',this)">📊 分析</button>
</div>

<!-- ═══ 記録タブ ═══ -->
<div class="pane on" id="pane-entry">
  <div class="form-card">
    <div class="form-title">◈ 新規トレード記録</div>

    <div class="row r3">
      <div class="field">
        <label>日付</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>方向</label>
        <div class="dir-btns">
          <button class="dir-btn" id="btn-call" onclick="setDir('CALL')">▲ CALL</button>
          <button class="dir-btn" id="btn-put" onclick="setDir('PUT')">▼ PUT</button>
        </div>
      </div>
      <div class="field">
        <label>グレード</label>
        <div class="grade-btns">
          <button class="gbtn" id="g-A" onclick="setGrade('A')">A</button>
          <button class="gbtn" id="g-B" onclick="setGrade('B')">B</button>
          <button class="gbtn" id="g-C" onclick="setGrade('C')">C</button>
          <button class="gbtn" id="g-D" onclick="setGrade('D')">D</button>
        </div>
      </div>
    </div>

    <div class="row r4">
      <div class="field">
        <label>エントリー価格 $</label>
        <input type="number" id="f-entry" step="0.01" placeholder="0.54" oninput="calcPnl()">
      </div>
      <div class="field">
        <label>決済価格 $</label>
        <input type="number" id="f-exit" step="0.01" placeholder="1.14" oninput="calcPnl()">
      </div>
      <div class="field">
        <label>SPY エントリー時 $</label>
        <input type="number" id="f-spy" step="0.01" placeholder="670.15">
      </div>
      <div class="field">
        <label>VIX</label>
        <input type="number" id="f-vix" step="0.1" placeholder="26.9">
      </div>
    </div>

    <div class="row r3">
      <div class="field">
        <label>エントリー残り時間</label>
        <select id="f-min">
          <option value="60">60分前</option>
          <option value="90">90分前</option>
          <option value="105">105分前</option>
          <option value="120" selected>120分前</option>
          <option value="150">150分前</option>
        </select>
      </div>
      <div class="field">
        <label>決済理由</label>
        <select id="f-reason">
          <option value="TP">指値利確（TP到達）</option>
          <option value="TIME">時間決済（15分前）</option>
          <option value="STRIKE">ストライク到達</option>
          <option value="SL">損切（SL）</option>
          <option value="MANUAL">手動決済</option>
        </select>
      </div>
      <div class="field">
        <label>OTM幅</label>
        <select id="f-otm">
          <option value="10">10%σ</option>
          <option value="15">15%σ</option>
          <option value="20" selected>20%σ</option>
          <option value="35">35%σ</option>
        </select>
      </div>
    </div>

    <div class="field" style="margin-bottom:8px">
      <label>メモ（任意）</label>
      <textarea id="f-memo" rows="2" style="width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:var(--text);padding:7px 9px;font-size:12px;resize:none"></textarea>
    </div>

    <!-- PnL Preview -->
    <div class="pnl-prev" id="pnl-prev" style="display:none">
      <div>
        <div style="font-size:8px;color:var(--dim);margin-bottom:2px">損益率</div>
        <div class="pnl-num" id="pnl-pct">—</div>
      </div>
      <div style="flex:1;padding-left:12px;border-left:1px solid var(--border)">
        <div style="font-size:9px;color:var(--dim)">結果</div>
        <div style="font-size:14px;font-weight:700;margin-top:2px" id="pnl-result">—</div>
      </div>
    </div>

    <button class="submit-btn" onclick="addTrade()">▶ 記録する</button>
  </div>
</div>

<!-- ═══ 履歴タブ ═══ -->
<div class="pane" id="pane-log">
  <div class="filters" id="filters">
    <span style="font-size:8px;color:var(--dim)">絞込:</span>
    <button class="fbtn on" onclick="setFilter('ALL',this)">全て</button>
    <button class="fbtn" onclick="setFilter('CALL',this)">▲CALL</button>
    <button class="fbtn" onclick="setFilter('PUT',this)">▼PUT</button>
    <button class="fbtn" onclick="setFilter('WIN',this)">勝ち</button>
    <button class="fbtn" onclick="setFilter('LOSS',this)">負け</button>
    <button class="fbtn" onclick="setFilter('A',this)">Grade A</button>
    <button class="fbtn" onclick="setFilter('B',this)">Grade B</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>日付</th><th>方向</th><th>Grade</th>
          <th>IN $</th><th>OUT $</th><th>損益%</th>
          <th>SPY</th><th>VIX</th><th>残り</th><th>決済</th><th>メモ</th><th></th>
        </tr>
      </thead>
      <tbody id="trade-tbody"></tbody>
    </table>
    <div class="empty" id="empty-msg">まだ記録がありません</div>
  </div>
</div>

<!-- ═══ 分析タブ ═══ -->
<div class="pane" id="pane-stats">

  <!-- Equity Curve -->
  <div class="curve-wrap">
    <div class="curve-title">◈ 累積損益カーブ</div>
    <svg id="eq-svg" width="100%" height="80" viewBox="0 0 800 80" preserveAspectRatio="none" style="display:block"></svg>
  </div>

  <!-- Grade breakdown -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <div style="background:var(--bg2);border:1px solid var(--border);padding:12px">
      <div class="sec-title">グレード別勝率</div>
      <div id="grade-stats"></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);padding:12px">
      <div class="sec-title">決済理由別</div>
      <div id="reason-stats"></div>
    </div>
  </div>

  <!-- Monthly -->
  <div style="background:var(--bg2);border:1px solid var(--border);padding:12px;margin-bottom:14px">
    <div class="sec-title">月次損益</div>
    <div id="monthly-chart"></div>
  </div>

  <!-- Best/Worst -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div style="background:var(--bg2);border:1px solid var(--border);padding:12px">
      <div class="sec-title" style="color:var(--g)">ベストトレード</div>
      <div id="best-trade"></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);padding:12px">
      <div class="sec-title" style="color:var(--r)">ワーストトレード</div>
      <div id="worst-trade"></div>
    </div>
  </div>

</div>

</div><!-- /wrap -->
<script>
const KEY='spy0dte_trades_v1';
const SEED=[
  {id:1741564800001,date:'2026-03-10',dir:'CALL',grade:'A',entry:0.54,exit:1.14,pct:111.11,spy:670.15,vix:26.87,min:120,reason:'STRIKE',otm:20,memo:'初リアルトレード',win:true},
  {id:1741651200002,date:'2026-03-11',dir:'CALL',grade:'B',entry:0.52,exit:0.01,pct:-98.08,spy:680,vix:48.13,min:120,reason:'TIME',otm:20,memo:'VWAP回帰完了地点でIN→割れて下落。満期消滅',win:false}
];
let trades=JSON.parse(localStorage.getItem(KEY)||'null');
if(!trades){trades=SEED;localStorage.setItem(KEY,JSON.stringify(trades));}
let filterMode='ALL';
let selDir='', selGrade='';

// Init date
document.getElementById('f-date').value=new Date().toISOString().slice(0,10);

function save(){localStorage.setItem(KEY,JSON.stringify(trades));}

function sw(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.getElementById('pane-'+t).classList.add('on');
  btn.classList.add('on');
  if(t==='log')renderLog();
  if(t==='stats')renderStats();
}

function setDir(d){
  selDir=d;
  document.getElementById('btn-call').className='dir-btn'+(d==='CALL'?' call-on':'');
  document.getElementById('btn-put').className='dir-btn'+(d==='PUT'?' put-on':'');
}
function setGrade(g){
  selGrade=g;
  ['A','B','C','D'].forEach(x=>{document.getElementById('g-'+x).className='gbtn'+(x===g?' on-'+x:'');});
}

function calcPnl(){
  const e=+document.getElementById('f-entry').value;
  const x=+document.getElementById('f-exit').value;
  if(!e||!x){document.getElementById('pnl-prev').style.display='none';return;}
  const pct=(x-e)/e*100;
  const win=pct>0;
  document.getElementById('pnl-prev').style.display='flex';
  const pc=document.getElementById('pnl-pct');
  pc.textContent=(pct>=0?'+':'')+pct.toFixed(1)+'%';
  pc.style.color=win?'var(--g)':'var(--r)';
  const pr=document.getElementById('pnl-result');
  pr.textContent=win?'✓ 勝ち':'✗ 負け';
  pr.style.color=win?'var(--g)':'var(--r)';
}

function addTrade(){
  const date=document.getElementById('f-date').value;
  const entry=+document.getElementById('f-entry').value;
  const exit=+document.getElementById('f-exit').value;
  const spy=+document.getElementById('f-spy').value;
  const vix=+document.getElementById('f-vix').value;
  if(!date||!entry||!exit||!selDir){alert('日付・方向・IN・OUT は必須です');return;}
  const pct=(exit-entry)/entry*100;
  trades.unshift({
    id:Date.now(),date,dir:selDir,grade:selGrade||'-',
    entry,exit,pct:+pct.toFixed(2),
    spy,vix,
    min:+document.getElementById('f-min').value,
    reason:document.getElementById('f-reason').value,
    otm:+document.getElementById('f-otm').value,
    memo:document.getElementById('f-memo').value,
    win:pct>0
  });
  save();
  updateStats();
  // Reset
  document.getElementById('f-entry').value='';
  document.getElementById('f-exit').value='';
  document.getElementById('f-spy').value='';
  document.getElementById('f-vix').value='';
  document.getElementById('f-memo').value='';
  document.getElementById('pnl-prev').style.display='none';
  alert('記録しました ✓');
}

function deleteTrade(id){
  if(!confirm('削除しますか？'))return;
  trades=trades.filter(t=>t.id!==id);
  save();updateStats();renderLog();
}

function updateStats(){
  const t=trades;
  const n=t.length;
  document.getElementById('s-total').textContent=n;
  if(!n){
    ['s-wr','s-avg','s-cum'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('s-wr-sub').textContent='0勝0敗';
    return;
  }
  const wins=t.filter(x=>x.win).length;
  const wr=(wins/n*100).toFixed(1);
  const cum=t.reduce((a,x)=>a+x.pct,0);
  const avg=(cum/n).toFixed(1);
  const wrEl=document.getElementById('s-wr');
  wrEl.textContent=wr+'%';
  wrEl.style.color=+wr>=55?'var(--g)':+wr>=45?'var(--y)':'var(--r)';
  document.getElementById('s-wr-sub').textContent=wins+'勝'+(n-wins)+'敗';
  const avgEl=document.getElementById('s-avg');
  avgEl.textContent=(+avg>=0?'+':'')+avg+'%';
  avgEl.style.color=+avg>=0?'var(--g)':'var(--r)';
  const cumEl=document.getElementById('s-cum');
  cumEl.textContent=(cum>=0?'+':'')+cum.toFixed(0)+'%';
  cumEl.style.color=cum>=0?'var(--g)':'var(--r)';
}

function setFilter(f,btn){
  filterMode=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderLog();
}

function getFiltered(){
  return trades.filter(t=>{
    if(filterMode==='ALL')return true;
    if(filterMode==='CALL')return t.dir==='CALL';
    if(filterMode==='PUT')return t.dir==='PUT';
    if(filterMode==='WIN')return t.win;
    if(filterMode==='LOSS')return !t.win;
    if(filterMode==='A')return t.grade==='A';
    if(filterMode==='B')return t.grade==='B';
    return true;
  });
}

function renderLog(){
  const rows=getFiltered();
  const tbody=document.getElementById('trade-tbody');
  const empty=document.getElementById('empty-msg');
  if(!rows.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const REASONS={TP:'指値TP',TIME:'時間',STRIKE:'ストライク',SL:'SL',MANUAL:'手動'};
  tbody.innerHTML=rows.map(t=>{
    const pc=t.win?'var(--g)':'var(--r)';
    const dc=t.dir==='CALL'?'var(--g)':'var(--r)';
    const gc=t.grade==='A'?'var(--g)':t.grade==='B'?'#b4dc00':t.grade==='C'?'#ffa500':'var(--r)';
    return `<tr class="fade">
      <td style="color:var(--dim)">${t.date}</td>
      <td style="color:${dc};font-weight:700">${t.dir==='CALL'?'▲':'▼'} ${t.dir}</td>
      <td style="color:${gc};font-weight:900;font-style:italic">${t.grade}</td>
      <td>$${t.entry}</td><td>$${t.exit}</td>
      <td style="color:${pc};font-weight:700">${t.pct>=0?'+':''}${t.pct}%</td>
      <td style="color:var(--dim)">${t.spy||'—'}</td>
      <td style="color:var(--dim)">${t.vix||'—'}</td>
      <td style="color:var(--dim)">${t.min}分</td>
      <td style="color:var(--dim);font-size:9px">${REASONS[t.reason]||t.reason}</td>
      <td style="color:var(--dim);font-size:9px;max-width:100px;overflow:hidden;text-overflow:ellipsis">${t.memo||''}</td>
      <td><button class="del-btn" onclick="deleteTrade(${t.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function renderStats(){
  if(!trades.length){
    ['grade-stats','reason-stats','monthly-chart','best-trade','worst-trade'].forEach(id=>{
      document.getElementById(id).innerHTML='<div class="empty">データなし</div>';
    });
    document.getElementById('eq-svg').innerHTML='';
    return;
  }

  // Equity curve
  const svg=document.getElementById('eq-svg');
  const sorted=[...trades].sort((a,b)=>a.date>b.date?1:-1);
  let cum=0; const pts=sorted.map((t,i)=>{cum+=t.pct;return{x:i,y:cum};});
  if(pts.length>1){
    const maxY=Math.max(...pts.map(p=>p.y),0);
    const minY=Math.min(...pts.map(p=>p.y),0);
    const rng=maxY-minY||1;
    const w=800,h=80,pad=5;
    const px=i=>pad+(i/(pts.length-1))*(w-pad*2);
    const py=v=>h-pad-(v-minY)/rng*(h-pad*2);
    const line=pts.map((p,i)=>`${i===0?'M':'L'}${px(i)},${py(p.y)}`).join(' ');
    const fill=`${line} L${px(pts.length-1)},${h} L${pad},${h} Z`;
    const pos=cum>=0; const col=pos?'#00e87a':'#ff2d55';
    svg.innerHTML=`<defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${pos?'rgba(0,232,122,.3)':'rgba(255,45,85,.3)'}"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/></linearGradient></defs>
      <line x1="${pad}" y1="${py(0)}" x2="${w-pad}" y2="${py(0)}" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/>
      <path d="${fill}" fill="url(#eg)"/>
      <path d="${line}" fill="none" stroke="${col}" stroke-width="1.5"/>`;
  }

  // Grade stats
  const grades=['A','B','C','D'];
  document.getElementById('grade-stats').innerHTML=grades.map(g=>{
    const gt=trades.filter(t=>t.grade===g);
    if(!gt.length)return'';
    const gw=gt.filter(t=>t.win).length;
    const wr=(gw/gt.length*100).toFixed(0);
    const c=g==='A'?'var(--g)':g==='B'?'#b4dc00':g==='C'?'#ffa500':'var(--r)';
    return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="color:${c};font-weight:900;font-style:italic;width:14px">${g}</span>
      <div style="flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">
        <div style="width:${wr}%;height:100%;background:${c};opacity:.7;border-radius:3px"></div></div>
      <span style="font-size:10px;color:${c}">${wr}%</span>
      <span style="font-size:9px;color:var(--dim)">${gt.length}T</span></div>`;
  }).join('');

  // Reason stats
  const RLBL={TP:'指値TP',TIME:'時間決済',STRIKE:'ストライク',SL:'SL',MANUAL:'手動'};
  const reasonMap={};
  trades.forEach(t=>{if(!reasonMap[t.reason])reasonMap[t.reason]={w:0,l:0};reasonMap[t.reason][t.win?'w':'l']++;});
  document.getElementById('reason-stats').innerHTML=Object.entries(reasonMap).map(([r,s])=>{
    const tot=s.w+s.l; const wr=(s.w/tot*100).toFixed(0);
    const c=+wr>=55?'var(--g)':+wr>=45?'var(--y)':'var(--r)';
    return`<div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px">
      <span style="color:var(--dim)">${RLBL[r]||r}</span>
      <span style="color:${c};font-weight:700">${wr}% <span style="color:var(--dim);font-weight:400">${tot}T</span></span></div>`;
  }).join('');

  // Monthly
  const monthly={};
  trades.forEach(t=>{const m=t.date.slice(0,7);if(!monthly[m])monthly[m]=0;monthly[m]+=t.pct;});
  const maxAbs=Math.max(...Object.values(monthly).map(Math.abs),1);
  document.getElementById('monthly-chart').innerHTML=Object.entries(monthly).sort().map(([m,v])=>{
    const c=v>=0?'var(--g)':'var(--r)';
    const w=Math.abs(v)/maxAbs*100;
    return`<div class="chart-bar-row">
      <div class="chart-label">${m.slice(5)}月</div>
      <div style="flex:1;height:18px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden">
        <div class="chart-bar" style="width:${w}%;background:${c};opacity:.7"></div></div>
      <div class="chart-val" style="color:${c}">${v>=0?'+':''}${v.toFixed(0)}%</div></div>`;
  }).join('');

  // Best/Worst
  const best=trades.reduce((a,b)=>b.pct>a.pct?b:a,trades[0]);
  const worst=trades.reduce((a,b)=>b.pct<a.pct?b:a,trades[0]);
  const tradeCard=(t,c)=>`
    <div style="font-size:11px;color:${c};font-weight:700;font-size:18px">${t.pct>=0?'+':''}${t.pct}%</div>
    <div style="font-size:9px;color:var(--dim);margin-top:4px">${t.date} / ${t.dir} / Grade${t.grade}</div>
    <div style="font-size:9px;color:var(--dim)">IN $${t.entry} → OUT $${t.exit}</div>
    ${t.memo?`<div style="font-size:9px;color:var(--dim);margin-top:3px">${t.memo}</div>`:''}`;
  document.getElementById('best-trade').innerHTML=tradeCard(best,'var(--g)');
  document.getElementById('worst-trade').innerHTML=tradeCard(worst,'var(--r)');
}
